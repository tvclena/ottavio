<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel SaaS • CB Systems</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --radius:16px;
  --shadow:0 15px 35px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#020617;
  color:#fff;
  height:100vh;
  padding:20px;
  overflow:auto;
}

.sidebar h2{
  margin-bottom:20px;
}

.empresa{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
}

.empresa:hover{
  background:rgba(255,255,255,.08);
}

.empresa img{
  width:35px;
  height:35px;
  border-radius:10px;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}

/* CARD */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}

/* BADGES */
.badge{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
}

.green{background:#dcfce7;color:#166534}
.red{background:#fee2e2;color:#991b1b}

/* INPUT */
input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid var(--border);
  border-radius:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* USER */
.user{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid var(--border);
}

.user small{
  color:var(--muted);
}

.actions button{
  background:var(--red);
}

/* INFO GRID */
.info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:14px;
}

.info div{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>Empresas</h2>
  <div id="empresas"></div>
</div>

<div class="main">

<div class="top">
  <h2 id="nomeEmpresa">Selecione uma empresa</h2>
</div>

<div class="grid">

<div class="card">
  <h3>Informações da Empresa</h3>
  <div id="dadosEmpresa"></div>
</div>

<div class="card">
  <h3>Criar Usuário</h3>

  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha">

  <select id="perfil">
    <option value="admin">Admin</option>
    <option value="gerente">Gerente</option>
    <option value="usuario">Usuário</option>
  </select>

  <button onclick="criar()">Criar usuário</button>
</div>

</div>

<div class="card" style="margin-top:20px">
  <h3>Usuários</h3>
  <div id="usuarios"></div>
</div>

</div>

<script>

const API = "/api/admin-users"

let EMPRESAS = []
let USUARIOS = []
let EMPRESA_ATUAL = null

async function carregar(){

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"listar" })
  })

  const data = await res.json()

  EMPRESAS = data.empresas || []
  USUARIOS = data.usuarios || []

  renderEmpresas()
}

function renderEmpresas(){

  const el = document.getElementById("empresas")
  el.innerHTML = ""

  EMPRESAS.forEach(e=>{
    el.innerHTML += `
      <div class="empresa" onclick="selecionar('${e.id}')">
        <img src="${e.logo_url}">
        <div>
          <b>${e.nome_fantasia || e.nome}</b><br>
          <small>${e.cidade || ""}</small>
        </div>
      </div>
    `
  })
}

function selecionar(id){

  EMPRESA_ATUAL = EMPRESAS.find(e=>e.id === id)

  document.getElementById("nomeEmpresa").innerText = EMPRESA_ATUAL.nome

  renderEmpresa()
  renderUsuarios()
}

function renderEmpresa(){

  const e = EMPRESA_ATUAL

  document.getElementById("dadosEmpresa").innerHTML = `
    <div class="info">
      <div><b>CNPJ:</b><br>${e.cnpj}</div>
      <div><b>Email:</b><br>${e.email}</div>
      <div><b>Telefone:</b><br>${e.telefone}</div>
      <div><b>Cidade:</b><br>${e.cidade}/${e.estado}</div>

      <div><b>Plano:</b><br>${e.plano}</div>
      <div><b>Status:</b><br>
        <span class="badge ${e.status === 'ativo' ? 'green':'red'}">${e.status}</span>
      </div>

      <div><b>Valor:</b><br>R$ ${e.valor_mensal}</div>
      <div><b>Vencimento:</b><br>${e.assinatura_expira}</div>

      <div><b>Usuários:</b><br>${e.usuarios_limite}</div>
      <div><b>Logins:</b><br>${e.total_logins}</div>
    </div>
  `
}

function renderUsuarios(){

  const lista = document.getElementById("usuarios")
  lista.innerHTML = ""

  const filtrados = USUARIOS.filter(u => u.empresa_id === EMPRESA_ATUAL.id)

  filtrados.forEach(u=>{
    lista.innerHTML += `
      <div class="user">
        <div>
          <b>${u.nome}</b><br>
          <small>${u.email}</small><br>
          <small>${u.perfil}</small>
        </div>
        <div class="actions">
          <button onclick="excluir('${u.auth_id}')">Excluir</button>
        </div>
      </div>
    `
  })
}

async function criar(){

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"criar",
      nome: nome.value,
      email: email.value,
      senha: senha.value,
      empresa_id: EMPRESA_ATUAL.id,
      perfil: perfil.value
    })
  })

  carregar()
}

async function excluir(id){

  if(!confirm("Excluir usuário?")) return

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"excluir",
      auth_id:id
    })
  })

  carregar()
}

carregar()

</script>

</body>
</html>
