<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CB Systems • Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="icon" href="https://ui-avatars.com/api/?name=CB&background=2563eb&color=fff">

<style>

:root{
--bg:#f1f5f9;
--card:#ffffff;
--border:#e2e8f0;
--text:#0f172a;
--muted:#64748b;
--primary:#2563eb;
--danger:#dc2626;
--success:#16a34a;
--radius:16px;
--shadow:0 15px 35px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
display:flex;
background:var(--bg);
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#020617;
color:#fff;
height:100vh;
padding:20px;
overflow:auto;
}

.empresa{
display:flex;
gap:10px;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.empresa:hover{
background:rgba(255,255,255,.08);
}

.empresa img{
width:40px;
height:40px;
border-radius:10px;
}

/* MAIN */
.main{
flex:1;
padding:25px;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid var(--border);
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:var(--primary);
color:#fff;
cursor:pointer;
margin-top:10px;
}

button.danger{background:var(--danger)}

.user{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid var(--border);
}

.badge{
padding:4px 8px;
border-radius:8px;
font-size:12px;
}

.green{background:#dcfce7;color:#166534}
.red{background:#fee2e2;color:#991b1b}

.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:16px;
width:400px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Empresas</h2>
<div id="empresas"></div>

<button onclick="novaEmpresa()">+ Empresa</button>
</div>

<div class="main">

<div class="top">
<h2 id="titulo">Selecione uma empresa</h2>
</div>

<div class="grid">

<div class="card">
<h3>Empresa</h3>
<div id="empresa"></div>

<button onclick="editarEmpresa()">Editar</button>
<button class="danger" onclick="excluirEmpresa()">Excluir</button>
</div>

<div class="card">
<h3>Novo Usuário</h3>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">

<select id="perfil">
<option value="admin">Admin</option>
<option value="gerente">Gerente</option>
<option value="usuario">Usuário</option>
</select>

<button onclick="criarUsuario()">Criar</button>
</div>

</div>

<div class="card" style="margin-top:20px">
<h3>Usuários</h3>
<div id="usuarios"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Empresa</h3>

<input id="e_nome" placeholder="Nome">
<input id="e_fantasia" placeholder="Fantasia">
<input id="e_email" placeholder="Email">
<input id="e_cidade" placeholder="Cidade">
<input id="e_estado" placeholder="Estado">
<input id="e_plano" placeholder="Plano">

<button onclick="salvarEmpresa()">Salvar</button>
</div>
</div>

<script>

const API="/api/admin"
const TOKEN="mercatto_admin_2026"

let EMPRESAS=[]
let USUARIOS=[]
let ATUAL=null

async function api(data){
const res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":TOKEN
},
body:JSON.stringify(data)
})
return res.json()
}

async function load(){
const d=await api({action:"listar"})
EMPRESAS=d.empresas||[]
USUARIOS=d.usuarios||[]
renderEmpresas()
}

function renderEmpresas(){
const el=document.getElementById("empresas")
el.innerHTML=""
EMPRESAS.forEach(e=>{
el.innerHTML+=`
<div class="empresa" onclick="selectEmpresa('${e.id}')">
<img src="${e.logo_url}">
<div>
<b>${e.nome_fantasia||e.nome}</b><br>
<small>${e.cidade||""}</small>
</div>
</div>`
})
}

function selectEmpresa(id){
ATUAL=EMPRESAS.find(e=>e.id===id)
document.getElementById("titulo").innerText=ATUAL.nome
renderEmpresa()
renderUsuarios()
}

function renderEmpresa(){
const e=ATUAL
document.getElementById("empresa").innerHTML=`
CNPJ: ${e.cnpj}<br>
Email: ${e.email}<br>
Plano: ${e.plano}<br>
Status: <span class="badge ${e.status==='ativo'?'green':'red'}">${e.status}</span><br>
Valor: R$ ${e.valor_mensal}<br>
Vencimento: ${e.assinatura_expira}<br>
Usuários limite: ${e.usuarios_limite}
`
}

function renderUsuarios(){
const el=document.getElementById("usuarios")
el.innerHTML=""
USUARIOS.filter(u=>u.empresa_id===ATUAL.id)
.forEach(u=>{
el.innerHTML+=`
<div class="user">
<div>
<b>${u.nome}</b><br>
<small>${u.email}</small>
</div>
<div>
<button class="danger" onclick="delUser('${u.auth_id}')">Excluir</button>
</div>
</div>`
})
}

async function criarUsuario(){
await api({
action:"criar_usuario",
nome:nome.value,
email:email.value,
senha:senha.value,
empresa_id:ATUAL.id,
perfil:perfil.value
})
load()
}

async function delUser(id){
if(!confirm("Excluir?"))return
await api({action:"excluir_usuario",auth_id:id})
load()
}

function novaEmpresa(){
modal.style.display="flex"
}

async function salvarEmpresa(){
await api({
action:"criar_empresa",
nome:e_nome.value,
nome_fantasia:e_fantasia.value,
email:e_email.value,
cidade:e_cidade.value,
estado:e_estado.value,
plano:e_plano.value
})
modal.style.display="none"
load()
}

function editarEmpresa(){
e_nome.value=ATUAL.nome
e_fantasia.value=ATUAL.nome_fantasia
e_email.value=ATUAL.email
e_cidade.value=ATUAL.cidade
e_estado.value=ATUAL.estado
e_plano.value=ATUAL.plano
novaEmpresa()
}

async function excluirEmpresa(){
if(!confirm("Excluir empresa?"))return
await api({action:"excluir_empresa",id:ATUAL.id})
load()
}

load()

</script>

</body>
</html>
