<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#f8fafc;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:16px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-bottom:12px;
}

h2{
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ef4444;
color:#fff;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Perfil da Empresa</h2>

<div id="dados"></div>

<button onclick="logout()">Sair</button>

<script>

const supabasePerfil = window.supabase.createClient(
  "https://fcehmjmtxqmrjkuqlkay.supabase.co",
  "sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
)

async function carregar(){

const email = localStorage.getItem("USER_EMAIL")

if(!email){
document.getElementById("dados").innerHTML = "Sessão não encontrada"
return
}

const { data: empresa, error } = await supabasePerfil
.from("empresas")
.select("*")
.eq("email", email)
.single()

if(error || !empresa){
document.getElementById("dados").innerHTML = "Erro ao carregar perfil"
return
}

const box = document.getElementById("dados")

box.innerHTML = `
<div class="card"><b>Empresa:</b> ${empresa.nome_fantasia}</div>
<div class="card"><b>CNPJ:</b> ${empresa.cnpj}</div>
<div class="card"><b>Email:</b> ${empresa.email}</div>
<div class="card"><b>Telefone:</b> ${empresa.telefone}</div>
<div class="card"><b>Plano:</b> ${empresa.plano}</div>
<div class="card"><b>Status:</b> ${empresa.status}</div>
<div class="card"><b>Vencimento:</b> ${new Date(empresa.assinatura_expira).toLocaleDateString()}</div>
`

}

async function logout(){

await supabasePerfil.auth.signOut()

localStorage.clear()

// 👉 redireciona o sistema inteiro (não só iframe)
window.top.location.href = "index.html"

}

carregar()

</script>

</body>
</html>
