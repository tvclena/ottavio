<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perfil • Mercatto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:#f1f5f9;
}

/* LOADING */

.loading{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
color:#64748b;
font-weight:600;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:12px;
padding:16px;
background:#fff;
border-bottom:1px solid #e5e7eb;
}

.avatar{
width:50px;
height:50px;
border-radius:12px;
overflow:hidden;
background:#e2e8f0;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-weight:800;
}

.plan{
font-size:12px;
color:#64748b;
}

/* CONTAINER */

.container{
padding:20px;
}

/* CARD */

.card{
background:#fff;
padding:16px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.label{
font-size:12px;
color:#64748b;
}

.value{
font-weight:700;
}

/* BOTÕES */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
margin-top:10px;
}

.primary{background:#2563eb;color:#fff;}
.danger{background:#ef4444;color:#fff;}

</style>

</head>

<body>

<div id="loading" class="loading">
<div>🔄 Carregando perfil...</div>
<div id="debug"></div>
</div>

<div id="app" style="display:none">

<div class="header">
<div class="avatar">
<img id="logo">
</div>

<div>
<div class="name" id="nome"></div>
<div class="plan" id="plano"></div>
</div>
</div>

<div class="container">

<div id="dados"></div>

<button class="btn primary" onclick="gerenciar()">
Gerenciar assinatura
</button>

<button class="btn danger" onclick="logout()">
Sair
</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://fcehmjmtxqmrjkuqlkay.supabase.co",
"sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
)

/* DEBUG VISUAL */
function log(msg){
document.getElementById("debug").innerText = msg
console.log(msg)
}

/* 🔥 PEGAR EMAIL CERTO */
async function pegarEmail(){

log("Buscando email...")

// 1️⃣ localStorage
let email = localStorage.getItem("USER_EMAIL")

if(email){
log("Email via localStorage")
return email
}

// 2️⃣ sessionStorage (backup)
email = sessionStorage.getItem("USER_EMAIL")

if(email){
log("Email via sessionStorage")
return email
}

// 3️⃣ auth (supabase)
const { data } = await supabase.auth.getUser()

if(data?.user?.email){
log("Email via auth")
localStorage.setItem("USER_EMAIL", data.user.email)
return data.user.email
}

// 4️⃣ retry
for(let i=0;i<5;i++){
await new Promise(r=>setTimeout(r,300))

email = localStorage.getItem("USER_EMAIL")
if(email){
log("Email após retry")
return email
}
}

return null
}

/* 🚀 INIT */
async function init(){

const email = await pegarEmail()

if(!email){
log("❌ EMAIL NÃO ENCONTRADO")
document.getElementById("loading").innerHTML = "Sessão não encontrada"
return
}

log("Email: " + email)

/* 🔥 BUSCA EMPRESA */
const { data, error } = await supabase
.from("empresas")
.select("*")
.eq("email", email)

if(error){
log("Erro banco: " + error.message)
document.getElementById("loading").innerHTML = "Erro ao carregar dados"
return
}

if(!data || !data.length){
log("❌ Empresa não encontrada")
document.getElementById("loading").innerHTML = "Empresa não encontrada"
return
}

const e = data[0]

log("Empresa carregada")

render(e)

document.getElementById("loading").style.display = "none"
document.getElementById("app").style.display = "block"

}

/* RENDER */

function render(e){

document.getElementById("nome").innerText = e.nome_fantasia
document.getElementById("plano").innerText = "Plano " + e.plano

document.getElementById("logo").src =
e.logo_url ||
"https://ui-avatars.com/api/?name="+encodeURIComponent(e.nome_fantasia)

/* DADOS COMPLETOS */

document.getElementById("dados").innerHTML = `

<div class="card"><div class="label">Empresa</div><div class="value">${e.nome}</div></div>

<div class="card"><div class="label">CNPJ</div><div class="value">${e.cnpj}</div></div>

<div class="card"><div class="label">Responsável</div><div class="value">${e.responsavel_nome}</div></div>

<div class="card"><div class="label">CPF</div><div class="value">${e.responsavel_cpf}</div></div>

<div class="card"><div class="label">Telefone</div><div class="value">${e.telefone}</div></div>

<div class="card"><div class="label">Endereço</div><div class="value">${e.endereco}, ${e.numero} - ${e.bairro}</div></div>

<div class="card"><div class="label">Cidade</div><div class="value">${e.cidade} - ${e.estado}</div></div>

<div class="card"><div class="label">Plano</div><div class="value">${e.plano}</div></div>

<div class="card"><div class="label">Valor</div><div class="value">R$ ${Number(e.valor_mensal).toFixed(2)}</div></div>

<div class="card"><div class="label">Vencimento</div><div class="value">Dia ${e.dia_vencimento}</div></div>

<div class="card"><div class="label">Expira em</div><div class="value">${new Date(e.assinatura_expira).toLocaleDateString()}</div></div>

<div class="card"><div class="label">Usuários</div><div class="value">${e.usuarios_limite}</div></div>

<div class="card"><div class="label">Filiais</div><div class="value">${e.filiais_limite}</div></div>

<div class="card"><div class="label">Status</div><div class="value">${e.status}</div></div>

`

}

/* AÇÕES */

function gerenciar(){
window.open("https://wa.me/557798253249?text=Quero%20gerenciar%20minha%20assinatura")
}

async function logout(){
await supabase.auth.signOut()
localStorage.clear()
sessionStorage.clear()
window.top.location.href = "index.html"
}

/* START */

init()

</script>

</body>
</html>
