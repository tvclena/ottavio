<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perfil • Mercatto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:#f1f5f9;
}

/* LOADING */

.loading{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-weight:600;
color:#64748b;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
background:#fff;
border-bottom:1px solid #e5e7eb;
}

.profileTop{
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
}

.avatar{
width:46px;
height:46px;
border-radius:14px;
overflow:hidden;
background:#e2e8f0;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-weight:800;
}

.plan{
font-size:12px;
color:#64748b;
}

/* DROPDOWN */

.menu{
position:absolute;
right:20px;
top:70px;
background:#fff;
border-radius:12px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
display:none;
min-width:200px;
padding:10px;
}

.menu div{
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.menu div:hover{
background:#f1f5f9;
}

/* CONTAINER */

.container{
padding:20px;
}

/* CARDS */

.card{
background:#fff;
border-radius:14px;
padding:16px;
margin-bottom:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.label{
font-size:12px;
color:#64748b;
}

.value{
font-weight:700;
}

/* ALERTA */

.alert{
background:#fff7ed;
color:#9a3412;
padding:12px;
border-radius:10px;
margin:10px 0;
display:none;
}

/* BOTÕES */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#2563eb;
color:#fff;
}

.danger{
background:#ef4444;
color:#fff;
}

</style>

</head>

<body>

<div id="loading" class="loading">
Carregando perfil...
</div>

<div id="app" style="display:none">

<div class="header">

<div class="profileTop" onclick="toggleMenu()">
<div class="avatar">
<img id="logo">
</div>

<div>
<div class="name" id="nome"></div>
<div class="plan" id="plano"></div>
</div>
</div>

</div>

<div id="menu" class="menu">
<div onclick="abrirEmpresas()">Trocar empresa</div>
<div onclick="gerenciar()">Gerenciar assinatura</div>
<div onclick="logout()">Sair</div>
</div>

<div class="container">

<div id="alerta" class="alert"></div>

<div id="dados"></div>

<button class="btn primary" onclick="gerenciar()">
Gerenciar assinatura
</button>

<button class="btn danger" onclick="logout()">
Sair
</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://fcehmjmtxqmrjkuqlkay.supabase.co",
"sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
)

/* 🔥 FUNÇÃO ESPERA EMAIL */
async function getEmailSeguro(){

let tentativas = 0

while(tentativas < 10){

let email = localStorage.getItem("USER_EMAIL")

if(email) return email

/* fallback auth */
const { data } = await supabase.auth.getUser()

if(data?.user?.email){
localStorage.setItem("USER_EMAIL", data.user.email)
return data.user.email
}

await new Promise(r=>setTimeout(r,300))

tentativas++
}

return null
}

/* 🚀 INIT */
async function iniciar(){

const email = await getEmailSeguro()

if(!email){
document.getElementById("loading").innerText = "Erro ao carregar sessão"
return
}

const { data: empresas } = await supabase
.from("empresas")
.select("*")
.eq("email", email)

if(!empresas || !empresas.length){
document.getElementById("loading").innerText = "Empresa não encontrada"
return
}

render(empresas[0])

document.getElementById("loading").style.display = "none"
document.getElementById("app").style.display = "block"

}

/* RENDER */

function render(e){

document.getElementById("nome").innerText = e.nome_fantasia
document.getElementById("plano").innerText = "Plano " + e.plano

document.getElementById("logo").src =
e.logo_url ||
"https://ui-avatars.com/api/?name="+encodeURIComponent(e.nome_fantasia)

/* ALERTA */

if(e.assinatura_expira){

const dias = Math.ceil((new Date(e.assinatura_expira) - new Date()) / 86400000)

if(dias <= 5){
const alerta = document.getElementById("alerta")
alerta.style.display = "block"
alerta.innerText = "⚠️ Sua assinatura vence em " + dias + " dias"
}

}

/* DADOS */

document.getElementById("dados").innerHTML = `

<div class="card">
<div class="label">CNPJ</div>
<div class="value">${e.cnpj || "-"}</div>
</div>

<div class="card">
<div class="label">Email</div>
<div class="value">${e.email}</div>
</div>

<div class="card">
<div class="label">Telefone</div>
<div class="value">${e.telefone || "-"}</div>
</div>

<div class="card">
<div class="label">Status</div>
<div class="value">${e.status}</div>
</div>

<div class="card">
<div class="label">Vencimento</div>
<div class="value">${new Date(e.assinatura_expira).toLocaleDateString()}</div>
</div>

`

}

/* UI */

function toggleMenu(){
const m = document.getElementById("menu")
m.style.display = m.style.display === "block" ? "none" : "block"
}

/* AÇÕES */

function abrirEmpresas(){
alert("Multi-empresa ativado no sistema principal")
}

function gerenciar(){
window.open("https://wa.me/557798253249?text=Quero%20gerenciar%20minha%20assinatura")
}

async function logout(){
await supabase.auth.signOut()
localStorage.clear()
window.top.location.href = "index.html"
}

/* START */

iniciar()

</script>

</body>
</html>
