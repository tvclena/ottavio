<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perfil </title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:#f8fafc;
height:100vh;
overflow:hidden;
}

/* LAYOUT PRINCIPAL */

.app{
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 22px;
background:#fff;
border-bottom:1px solid #e5e7eb;
}

.profile{
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
}

.avatar{
width:52px;
height:52px;
border-radius:16px;
overflow:hidden;
background:#e2e8f0;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
display:flex;
flex-direction:column;
}

.name{
font-size:16px;
font-weight:800;
color:#0f172a;
}

.plan{
font-size:12px;
color:#64748b;
}

/* DROPDOWN */

.menu{
position:absolute;
right:20px;
top:80px;
background:#fff;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
display:none;
padding:10px;
min-width:220px;
z-index:999;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.menu div:hover{
background:#f1f5f9;
}

/* ALERTA */

.alert{
margin:10px 20px;
padding:12px;
border-radius:12px;
background:#fff7ed;
color:#9a3412;
border:1px solid #fed7aa;
font-weight:600;
display:none;
}

/* GRID */

.content{
flex:1;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(3,1fr);
gap:12px;
padding:16px;
}

/* CARD */

.card{
background:#fff;
border-radius:14px;
padding:14px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
justify-content:center;
}

.label{
font-size:11px;
color:#64748b;
}

.value{
font-weight:800;
font-size:14px;
margin-top:2px;
color:#0f172a;
}

/* BOTÕES */

.actions{
display:flex;
gap:10px;
padding:12px 16px;
border-top:1px solid #e5e7eb;
background:#fff;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

.primary{background:#2563eb;color:#fff;}
.danger{background:#ef4444;color:#fff;}

.loading{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:#64748b;
}

</style>

</head>

<body>

<div id="loading" class="loading">
Carregando perfil...
</div>

<div id="app" class="app" style="display:none">

<!-- HEADER -->
<div class="header">

<div class="profile" onclick="toggleMenu()">
<div class="avatar">
<img id="logo">
</div>

<div class="info">
<div class="name" id="nome"></div>
<div class="plan" id="plano"></div>
</div>
</div>

</div>

<!-- DROPDOWN -->
<div id="menu" class="menu">
<div onclick="gerenciar()">Gerenciar assinatura</div>
<div onclick="logout()">Sair</div>
</div>

<!-- ALERTA -->
<div id="alerta" class="alert"></div>

<!-- GRID -->
<div id="dados" class="content"></div>

<!-- AÇÕES -->
<div class="actions">
<button class="btn primary" onclick="gerenciar()">Gerenciar</button>
<button class="btn danger" onclick="logout()">Sair</button>
</div>

</div>

<script>

/* CLIENT */
const client = window.supabase.createClient(
"https://fcehmjmtxqmrjkuqlkay.supabase.co",
"sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
)

/* EMAIL */
async function getEmail(){

let email = localStorage.getItem("USER_EMAIL")
if(email) return email

const { data } = await client.auth.getUser()
if(data?.user?.email){
localStorage.setItem("USER_EMAIL", data.user.email)
return data.user.email
}

return null
}

/* INIT */
async function init(){

const email = await getEmail()

if(!email){
document.getElementById("loading").innerText="Sessão não encontrada"
return
}

const { data } = await client
.from("empresas")
.select("*")
.eq("email", email)

if(!data?.length){
document.getElementById("loading").innerText="Empresa não encontrada"
return
}

const e = data[0]

/* HEADER */
document.getElementById("nome").innerText = e.nome_fantasia
document.getElementById("plano").innerText = "Plano " + e.plano

document.getElementById("logo").src =
e.logo_url || "https://ui-avatars.com/api/?name="+encodeURIComponent(e.nome_fantasia)

/* ALERTA */
if(e.assinatura_expira){

const dias = Math.ceil((new Date(e.assinatura_expira)-new Date())/86400000)

if(dias <= 5){
const alerta = document.getElementById("alerta")
alerta.style.display="block"
alerta.innerText="⚠️ Vence em "+dias+" dias"
}
}

/* GRID SUPER OTIMIZADO */
document.getElementById("dados").innerHTML = `

<div class="card"><div class="label">Empresa</div><div class="value">${e.nome}</div></div>
<div class="card"><div class="label">CNPJ</div><div class="value">${e.cnpj}</div></div>
<div class="card"><div class="label">Email</div><div class="value">${e.email}</div></div>
<div class="card"><div class="label">Telefone</div><div class="value">${e.telefone}</div></div>

<div class="card"><div class="label">Responsável</div><div class="value">${e.responsavel_nome}</div></div>
<div class="card"><div class="label">Cidade</div><div class="value">${e.cidade}-${e.estado}</div></div>
<div class="card"><div class="label">Plano</div><div class="value">${e.plano}</div></div>
<div class="card"><div class="label">Status</div><div class="value">${e.status}</div></div>

<div class="card"><div class="label">Valor</div><div class="value">R$ ${Number(e.valor_mensal).toFixed(2)}</div></div>
<div class="card"><div class="label">Vencimento</div><div class="value">Dia ${e.dia_vencimento}</div></div>
<div class="card"><div class="label">Expira</div><div class="value">${new Date(e.assinatura_expira).toLocaleDateString()}</div></div>
<div class="card"><div class="label">Usuários</div><div class="value">${e.usuarios_limite}</div></div>

`

document.getElementById("loading").style.display="none"
document.getElementById("app").style.display="flex"

}

/* UI */
function toggleMenu(){
const m=document.getElementById("menu")
m.style.display = m.style.display==="block"?"none":"block"
}

/* AÇÕES */
function gerenciar(){
window.open("https://wa.me/557798253249")
}

async function logout(){
await client.auth.signOut()
localStorage.clear()
window.top.location.href="index.html"
}

/* START */
init()

</script>

</body>
</html>
