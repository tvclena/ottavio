<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aplicativos • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2563eb;
--bg:#f8fafc;
--card:#ffffff;

--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;

--radius:20px;

--shadow:0 8px 25px rgba(0,0,0,.08);
--shadow-hover:0 18px 40px rgba(0,0,0,.12);
}

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#ffffff,#f1f5f9);
color:var(--text);
}

/* ================= HEADER ================= */

.header{
padding:18px;
position:sticky;
top:0;
z-index:50;

background:rgba(255,255,255,.85);
backdrop-filter:blur(14px);

border-bottom:1px solid var(--border);

display:flex;
flex-direction:column;
gap:12px;
}

.title{
font-size:22px;
font-weight:900;
}

/* SEARCH */

.search{
height:44px;
border-radius:14px;
border:1px solid var(--border);
padding:0 14px;
font-size:14px;
font-weight:600;
background:#fff;
}

.search:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,.1);
}

/* FILTROS */

.filters{
display:flex;
gap:8px;
overflow:auto;
padding-bottom:4px;
}

.filter{
padding:8px 12px;
border-radius:999px;
border:1px solid var(--border);
font-size:12px;
font-weight:700;
cursor:pointer;
white-space:nowrap;
background:#fff;
}

.filter.active{
background:var(--primary);
color:#fff;
border-color:var(--primary);
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:18px;
padding:18px;
}

/* ================= CARD ================= */

.card{
background:var(--card);
border-radius:22px;
overflow:hidden;
cursor:pointer;
transition:.25s ease;

display:flex;
flex-direction:column;

text-decoration:none;
color:inherit;

border:1px solid var(--border);
}

.card:hover{
transform:translateY(-6px);
box-shadow:var(--shadow-hover);
}

/* IMAGE */

.card-img{
height:120px;
overflow:hidden;
position:relative;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* overlay */

.card-img::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.3), transparent);
}

/* BODY */

.card-body{
padding:14px;
display:flex;
flex-direction:column;
gap:6px;
}

.card-title{
font-size:14px;
font-weight:800;
line-height:1.2;
}

.card-desc{
font-size:12px;
color:var(--muted);
}

/* TAG */

.tag{
margin-top:6px;
font-size:10px;
font-weight:800;
padding:5px 8px;
border-radius:999px;
background:#eef2ff;
color:#3730a3;
width:max-content;
}

/* LOADING */

.loading{
padding:40px;
text-align:center;
color:var(--muted);
font-weight:600;
}

/* MOBILE */

@media(max-width:520px){

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card-img{
height:90px;
}

.card-desc{
display:none;
}

}

</style>
</head>

<body>

<div class="header">

<div class="title">Aplicativos</div>

<input id="search" class="search" placeholder="Buscar aplicativo...">

<div id="filters" class="filters"></div>

</div>

<div id="grid" class="grid"></div>

<script>

/* ================= DADOS ================= */

const apps=[

{nome:"PDV Garçom",descricao:"Pedidos e mesas",tipo:"Operacional",imagem:"https://images.unsplash.com/photo-1556740738-b6a63e27c4df",link:"pdv-garcom.html"},

{nome:"PDV Bebidas",descricao:"Venda rápida",tipo:"Operacional",imagem:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092",link:"pdv-bebidas.html"},

{nome:"CMV Dashboard",descricao:"Custos e lucro",tipo:"Financeiro",imagem:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",link:"cmv.html"},

{nome:"Buffet Controle",descricao:"Reposição buffet",tipo:"Operacional",imagem:"https://images.unsplash.com/photo-1504674900247-0877df9cc836",link:"buffet.html"},

{nome:"Financeiro",descricao:"Relatórios",tipo:"Financeiro",imagem:"https://images.unsplash.com/photo-1526304640581-d334cdbbf45e",link:"financeiro.html"},

{nome:"Auditoria",descricao:"Histórico sistema",tipo:"Auditoria",imagem:"https://images.unsplash.com/photo-1454165804606-c3d57bc86b40",link:"auditoria.html"}

];

/* ================= ESTADO ================= */

let filtroAtual="Todos";

/* ================= FILTROS ================= */

const tipos=["Todos",...new Set(apps.map(a=>a.tipo))];

const filtersEl=document.getElementById("filters");

filtersEl.innerHTML=tipos.map(t=>
`<div class="filter ${t==="Todos"?"active":""}" onclick="setFiltro('${t}',this)">
${t}
</div>`
).join("");

function setFiltro(tipo,el){
filtroAtual=tipo;

document.querySelectorAll(".filter").forEach(f=>f.classList.remove("active"));
el.classList.add("active");

render();
}

/* ================= RENDER ================= */

const grid=document.getElementById("grid");

function render(){

const busca=search.value.toLowerCase();

const filtrados=apps.filter(a=>
(!busca || a.nome.toLowerCase().includes(busca)) &&
(filtroAtual==="Todos" || a.tipo===filtroAtual)
);

grid.innerHTML=filtrados.map(a=>`
<a href="${a.link}" class="card">

<div class="card-img">
<img src="${a.imagem}" loading="lazy">
</div>

<div class="card-body">

<div class="card-title">${a.nome}</div>
<div class="card-desc">${a.descricao}</div>
<div class="tag">${a.tipo}</div>

</div>

</a>
`).join("");

}

/* ================= PERFORMANCE ================= */

/* debounce busca */

let timer;
search.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(render,200);
});

/* INIT */

render();

</script>

</body>
</html>
