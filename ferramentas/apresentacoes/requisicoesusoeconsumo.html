<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Demo • Sistema de Requisições</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--azul:#1677ff;
--verde:#22c55e;
--bg:#f1f5f9;
--card:#ffffff;
--border:#e2e8f0;
--text:#0f172a;
--muted:#64748b;
}

*{box-sizing:border-box}
body{margin:0;font-family:Inter;background:var(--bg);color:var(--text)}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#fff;
border-bottom:1px solid var(--border);
}

.logo{
display:flex;
gap:10px;
align-items:center;
font-weight:800;
}

.btn{
background:var(--verde);
color:#fff;
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

/* STATUS */
.status{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
padding:10px;
background:#fff;
border-bottom:1px solid var(--border);
}

.card-status{
background:#f9fafb;
padding:10px 14px;
border-radius:8px;
font-weight:700;
display:flex;
gap:8px;
}

.badge{
background:#000;
color:#fff;
padding:3px 8px;
border-radius:6px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:400px 1fr;
gap:20px;
padding:20px;
}

/* FORM */
.form{
background:#fff;
padding:20px;
border-radius:12px;
}

.form h2{text-align:center}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

.unidades{
display:flex;
gap:8px;
margin-top:10px;
}

.unidades button{
flex:1;
padding:8px;
border-radius:20px;
border:2px solid var(--azul);
background:#fff;
cursor:pointer;
}

.active{
background:var(--azul);
color:#fff;
}

/* TABELA */
.painel{
background:#fff;
border-radius:12px;
overflow:hidden;
}

thead{
background:var(--azul);
color:#fff;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td,th{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

/* RESPONSIVO */
@media(max-width:900px){
.grid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
<div class="logo">
🏢 <span>REQUISIÇÕES DE USO E CONSUMO</span>
</div>

<button class="btn" onclick="ativar()">
🚀 Ativar R$29,90
</button>
</header>

<!-- STATUS -->
<div class="status">
<div class="card-status">PENDENTE <span class="badge" id="c1">0</span></div>
<div class="card-status">CARRINHO <span class="badge">0</span></div>
<div class="card-status">COMPRADO <span class="badge">0</span></div>
<div class="card-status">NEGADO <span class="badge">0</span></div>
<div class="card-status">ENTREGUE <span class="badge">0</span></div>
<div class="card-status">SEM ESTOQUE <span class="badge">0</span></div>
</div>

<div class="grid">

<!-- FORM -->
<div class="form">

<h2>Requisição de produtos</h2>

<label>Solicitante</label>
<input id="solicitante" value="DEMO" readonly>

<label>Setor</label>
<select id="setor">
<option>BAR</option>
<option>COZINHA</option>
</select>

<label>Produto</label>
<input id="produto">

<label>Quantidade</label>
<input id="qtd" type="number">

<label>Unidade</label>
<div class="unidades">
<button onclick="setU(this,'UN')">UN</button>
<button onclick="setU(this,'KG')">KG</button>
<button onclick="setU(this,'CX')" class="active">CX</button>
</div>

<label>Observações</label>
<textarea id="obs"></textarea>

<button class="btn" style="width:100%;margin-top:10px" onclick="enviar()">
ENVIAR ITEM
</button>

</div>

<!-- PAINEL -->
<div class="painel">
<table>
<thead>
<tr>
<th>Data</th>
<th>Item</th>
<th>Qtd</th>
<th>Unid</th>
<th>Setor</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>

let unidade="CX"

/* STORAGE */
function salvar(lista){
localStorage.setItem("demo",JSON.stringify({
time:Date.now(),
lista
}))
}

function carregar(){
const d=JSON.parse(localStorage.getItem("demo"))
if(!d)return []

if(Date.now()-d.time>72000000){
localStorage.removeItem("demo")
return []
}

return d.lista
}

/* UNIDADE */
function setU(btn,u){
unidade=u
document.querySelectorAll(".unidades button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

/* ENVIAR */
function enviar(){

if(!produto.value || !qtd.value){
alert("Preencha os campos")
return
}

let lista=carregar()

lista.unshift({
data:new Date().toLocaleString(),
produto:produto.value,
qtd:qtd.value,
unidade,
setor:setor.value,
status:"PENDENTE"
})

salvar(lista)
render()

produto.value=""
qtd.value=""
obs.value=""
}

/* RENDER */
function render(){

let lista=carregar()
tabela.innerHTML=""

lista.forEach(i=>{
tabela.innerHTML+=`
<tr>
<td>${i.data}</td>
<td>${i.produto}</td>
<td>${i.qtd}</td>
<td>${i.unidade}</td>
<td>${i.setor}</td>
<td>${i.status}</td>
</tr>`
})

document.getElementById("c1").innerText=lista.length
}

/* WHATS */
function ativar(){

const msg=`
Quero ativar o sistema de requisições

Plano: R$29,90/mês
`;

window.open("https://wa.me/5577999999999?text="+encodeURIComponent(msg))
}

/* INIT */
render()

</script>

</body>
</html>
