<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Requisições • Demo</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--azul:#2b6fe8;
--verde:#22c55e;
--bg:#eef2f7;
--card:#ffffff;
--border:#e2e8f0;
--text:#0f172a;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
}

/* HERO */
.hero{
padding:40px 20px;
text-align:center;
background:#fff;
border-bottom:1px solid var(--border);
}

.hero h1{margin:0;font-size:28px;}
.hero p{color:#64748b;margin-top:10px;}

.btn{
background:var(--verde);
color:#fff;
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#fff;
border-bottom:1px solid var(--border);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
padding:20px;
}

/* CARDS */
.card{
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}

/* FORM */
.form{
padding:20px;
}

.box-title{
font-weight:800;
font-size:18px;
margin-bottom:15px;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{resize:none}

/* UNIDADES */
.unidades{
display:flex;
gap:8px;
margin-top:10px;
}

.unidades button{
flex:1;
padding:8px;
border-radius:20px;
border:2px solid var(--azul);
background:#fff;
cursor:pointer;
}

.unidades button.active{
background:var(--azul);
color:#fff;
}

/* PAINEL HEADER */
.panel-header{
padding:15px 20px;
font-weight:800;
border-bottom:1px solid var(--border);
}

/* STATUS */
.status{
display:flex;
gap:10px;
flex-wrap:wrap;
padding:12px 20px;
border-bottom:1px solid var(--border);
background:#f8fafc;
}

.card-status{
background:#fff;
padding:8px 12px;
border-radius:10px;
font-weight:700;
display:flex;
gap:6px;
align-items:center;
border:1px solid var(--border);
}

.badge{
background:#000;
color:#fff;
padding:2px 7px;
border-radius:6px;
font-size:12px;
}

/* TABELA */
thead{
background:var(--azul);
color:#fff;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td,th{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

/* STATUS SELECT */
select.status-select{
padding:5px;
border-radius:6px;
}

/* RESPONSIVO */
@media(max-width:900px){
.grid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Sistema de Requisições Inteligente</h1>
<p>Controle total de pedidos em tempo real</p>
<button class="btn" onclick="ativar()">🚀 Ativar por R$29,90</button>
</div>

<header>
<b>DEMO DO SISTEMA</b>
<button class="btn" onclick="ativar()">Ativar Agora</button>
</header>

<div class="grid">

<!-- FORM -->
<div class="card form">

<div class="box-title">📦 Módulo de Requisição</div>

<label>Solicitante</label>
<input value="ANDRÉ" readonly>

<label>Setor</label>
<select id="setor">
<option>BAR</option>
<option>COZINHA</option>
</select>

<label>Produto</label>
<input id="produto">

<label>Quantidade</label>
<input id="qtd" type="number">

<label>Unidade</label>
<div class="unidades">
<button onclick="setU(this,'UN')">UN</button>
<button onclick="setU(this,'KG')">KG</button>
<button onclick="setU(this,'CX')" class="active">CX</button>
</div>

<label>Observações</label>
<textarea id="obs"></textarea>

<button class="btn" style="width:100%;margin-top:12px" onclick="enviar()">
ENVIAR ITEM
</button>

</div>

<!-- PAINEL -->
<div class="card">

<div class="panel-header">📊 Painel de Requisições</div>

<div class="status">
<div class="card-status">PENDENTE <span class="badge" id="cP">0</span></div>
<div class="card-status">CARRINHO <span class="badge" id="cC">0</span></div>
<div class="card-status">COMPRADO <span class="badge" id="cCO">0</span></div>
<div class="card-status">NEGADO <span class="badge" id="cN">0</span></div>
<div class="card-status">ENTREGUE <span class="badge" id="cE">0</span></div>
<div class="card-status">SEM ESTOQUE <span class="badge" id="cS">0</span></div>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Item</th>
<th>Qtd</th>
<th>Unid</th>
<th>Setor</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

</div>

<script>

let unidade="CX"

function salvar(lista){
localStorage.setItem("demo_req",JSON.stringify({
time:Date.now(),
dados:lista
}))
}

function carregar(){
const data=JSON.parse(localStorage.getItem("demo_req"))
if(!data)return []

if(Date.now()-data.time>72000000){
localStorage.removeItem("demo_req")
return []
}

return data.dados
}

function setU(btn,u){
unidade=u
document.querySelectorAll(".unidades button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function enviar(){

if(!produto.value || !qtd.value){
alert("Preencha os campos")
return
}

let lista=carregar()

lista.unshift({
data:new Date().toLocaleString(),
produto:produto.value,
qtd:qtd.value,
unidade,
setor:setor.value,
status:"PENDENTE"
})

salvar(lista)
render()

produto.value=""
qtd.value=""
obs.value=""
}

function atualizarStatus(index,novo){
let lista=carregar()
lista[index].status=novo
salvar(lista)
render()
}

function render(){

let lista=carregar()

let count={
PENDENTE:0,
CARRINHO:0,
COMPRADO:0,
NEGADO:0,
ENTREGUE:0,
"SEM ESTOQUE":0
}

tabela.innerHTML=""

lista.forEach((i,idx)=>{

count[i.status]++

tabela.innerHTML+=`
<tr>
<td>${i.data}</td>
<td>${i.produto}</td>
<td>${i.qtd}</td>
<td>${i.unidade}</td>
<td>${i.setor}</td>
<td>
<select class="status-select" onchange="atualizarStatus(${idx},this.value)">
<option ${i.status=="PENDENTE"?"selected":""}>PENDENTE</option>
<option ${i.status=="CARRINHO"?"selected":""}>CARRINHO</option>
<option ${i.status=="COMPRADO"?"selected":""}>COMPRADO</option>
<option ${i.status=="NEGADO"?"selected":""}>NEGADO</option>
<option ${i.status=="ENTREGUE"?"selected":""}>ENTREGUE</option>
<option ${i.status=="SEM ESTOQUE"?"selected":""}>SEM ESTOQUE</option>
</select>
</td>
</tr>`
})

document.getElementById("cP").innerText=count["PENDENTE"]
document.getElementById("cC").innerText=count["CARRINHO"]
document.getElementById("cCO").innerText=count["COMPRADO"]
document.getElementById("cN").innerText=count["NEGADO"]
document.getElementById("cE").innerText=count["ENTREGUE"]
document.getElementById("cS").innerText=count["SEM ESTOQUE"]

}

function ativar(){

const msg=`
Quero ativar o sistema de requisições

💰 Plano: R$29,90/mês
📦 Sistema completo com controle de status

Quero ativar agora.
`;

window.open("https://wa.me/5577999999999?text="+encodeURIComponent(msg))
}

render()

</script>

</body>
</html>
