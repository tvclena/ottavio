<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Demo • Sistema de Requisições</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--azul:#1677ff;
--verde:#22c55e;
--bg:#f1f5f9;
--card:#fff;
--border:#e2e8f0;
}

*{box-sizing:border-box}
body{margin:0;font-family:Inter;background:var(--bg)}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#fff;
border-bottom:1px solid var(--border);
}

.btn{
background:var(--verde);
color:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

/* LOGIN */
.login{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.box{
background:#fff;
padding:25px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* APP */
.app{display:none}

.grid{
display:grid;
grid-template-columns:400px 1fr;
gap:20px;
padding:20px;
}

/* FORM */
.form{
background:#fff;
padding:20px;
border-radius:12px;
}

.form h2{text-align:center}

.unidades{
display:flex;
gap:8px;
margin-top:10px;
}

.unidades button{
flex:1;
padding:8px;
border-radius:20px;
border:2px solid var(--azul);
background:#fff;
cursor:pointer;
}

.active{
background:var(--azul);
color:#fff;
}

/* TABELA */
.painel{
background:#fff;
border-radius:12px;
overflow:hidden;
}

thead{
background:var(--azul);
color:#fff;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

/* RESPONSIVO */
@media(max-width:900px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="box">
<h3>Login Demo</h3>
<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha" type="password">
<button class="btn" onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<header>
<div><b>CB SYSTEMS</b> • Requisições</div>
<button class="btn" onclick="ativar()">🚀 Ativar R$29,90</button>
</header>

<div class="grid">

<!-- FORM -->
<div class="form">
<h2>Requisição</h2>

<input id="produto" placeholder="Produto">
<input id="qtd" placeholder="Quantidade">

<div class="unidades">
<button onclick="setU(this,'UN')">UN</button>
<button onclick="setU(this,'KG')">KG</button>
<button onclick="setU(this,'CX')" class="active">CX</button>
</div>

<button class="btn" style="margin-top:10px;width:100%" onclick="enviar()">
ENVIAR
</button>
</div>

<!-- PAINEL -->
<div class="painel">
<table>
<thead>
<tr>
<th>Item</th>
<th>Qtd</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

</div>

<script>

let unidade="CX"

/* LOGIN */
function entrar(){
if(pass.value==="1234"){
login.style.display="none"
app.style.display="block"
carregar()
}else{
alert("Senha: 1234")
}
}

/* STORAGE COM EXPIRAÇÃO */
function salvar(dados){
localStorage.setItem("demo",JSON.stringify({
data:Date.now(),
dados
}))
}

function carregar(){
const data=JSON.parse(localStorage.getItem("demo"))
if(!data)return

if(Date.now()-data.data>72000000){ // 20h
localStorage.removeItem("demo")
return
}

render(data.dados)
}

/* UNIDADE */
function setU(btn,u){
unidade=u
document.querySelectorAll(".unidades button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

/* ENVIAR */
function enviar(){

const item={
produto:produto.value,
qtd:qtd.value,
status:"PENDENTE"
}

let lista=[]

const data=JSON.parse(localStorage.getItem("demo"))
if(data) lista=data.dados

lista.unshift(item)

salvar(lista)
render(lista)

produto.value=""
qtd.value=""
}

/* RENDER */
function render(lista){
tabela.innerHTML=""

lista.forEach(i=>{
tabela.innerHTML+=`
<tr>
<td>${i.produto}</td>
<td>${i.qtd}</td>
<td>${i.status}</td>
</tr>`
})
}

/* WHATS */
function ativar(){

const msg=`
Quero ativar o sistema de requisições

Plano: R$29,90/mês
`;

window.open("https://wa.me/5577999999999?text="+encodeURIComponent(msg))
}

</script>

</body>
</html>
