<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Aplicativos • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2563eb;
--primary-dark:#1e40af;

--bg:#0b1220;
--card:#111827;

--text:#f1f5f9;
--muted:#94a3b8;
--border:#1f2937;

--radius:18px;

--shadow:0 10px 30px rgba(0,0,0,.4);
}

*{
box-sizing:border-box;
-webkit-font-smoothing:antialiased;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#020617,#0b1220);
color:var(--text);
}

/* ================= HEADER ================= */

.header{

padding:16px;

position:sticky;
top:0;
z-index:50;

background:rgba(2,6,23,.9);
backdrop-filter:blur(10px);

border-bottom:1px solid var(--border);

display:flex;
flex-direction:column;
gap:10px;
}

.title{
font-size:18px;
font-weight:900;
}

/* SEARCH */

.search{

height:40px;

border-radius:12px;
border:1px solid var(--border);

padding:0 12px;

font-size:14px;
font-weight:600;

background:#020617;
color:#fff;
}

/* ================= GRID ================= */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(160px,1fr));

gap:16px;

padding:16px;
}

/* ================= CARD ================= */

.card{

background:var(--card);

border-radius:20px;

overflow:hidden;

cursor:pointer;

transition:.2s;

display:flex;
flex-direction:column;

text-decoration:none;
color:inherit;

border:1px solid var(--border);
}

.card:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:var(--shadow);
}

/* IMAGE */

.card-img{

height:110px;

background:#020617;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* BODY */

.card-body{
padding:10px;
display:flex;
flex-direction:column;
gap:4px;
}

.card-title{
font-size:13px;
font-weight:900;
line-height:1.2;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.card-desc{
font-size:11px;
color:var(--muted);

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

/* TAG */

.tag{
margin-top:4px;

font-size:9px;
font-weight:900;

padding:4px 6px;

border-radius:999px;

background:#1e3a8a;
color:#c7d2fe;

width:max-content;
}

/* ================= MOBILE ================= */

@media(max-width:520px){

.grid{
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card-img{
height:80px;
}

.card-title{
font-size:11px;
}

.card-desc{
display:none;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="title">📲 Aplicativos</div>

<input
id="search"
class="search"
type="text"
placeholder="Buscar aplicativo..."
>

</div>

<!-- GRID -->

<div id="grid" class="grid"></div>

<script>

/* =========================
   APLICATIVOS
========================= */

const apps=[

{
nome:"PDV Garçom",
descricao:"Pedidos e controle de mesas",
tipo:"operacional",
imagem:"https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
link:"pdv-garcom.html"
},

{
nome:"PDV Bebidas",
descricao:"Venda rápida de bebidas",
tipo:"operacional",
imagem:"https://cdn-icons-png.flaticon.com/512/3050/3050525.png",
link:"pdv-bebidas.html"
},

{
nome:"CMV Dashboard",
descricao:"Controle de custos e lucro",
tipo:"financeiro",
imagem:"https://cdn-icons-png.flaticon.com/512/1828/1828919.png",
link:"cmv.html"
},

{
nome:"Buffet Controle",
descricao:"Gestão de reposição e consumo",
tipo:"operacional",
imagem:"https://cdn-icons-png.flaticon.com/512/1046/1046857.png",
link:"buffet.html"
},

{
nome:"Financeiro",
descricao:"Relatórios financeiros",
tipo:"financeiro",
imagem:"https://cdn-icons-png.flaticon.com/512/3135/3135679.png",
link:"financeiro.html"
},

{
nome:"Auditoria",
descricao:"Histórico e logs",
tipo:"auditoria",
imagem:"https://cdn-icons-png.flaticon.com/512/1828/1827933.png",
link:"auditoria.html"
}

];

/* =========================
   RENDER
========================= */

function render(){

const grid=document.getElementById("grid");

const busca=document
.getElementById("search")
.value
.toLowerCase();

grid.innerHTML="";

apps
.filter(a=>
!busca ||
a.nome.toLowerCase().includes(busca)
)
.forEach(a=>{

const card=document.createElement("a");

card.href=a.link;

card.className="card";

card.innerHTML=`

<div class="card-img">
<img src="${a.imagem}">
</div>

<div class="card-body">

<div class="card-title">${a.nome}</div>

<div class="card-desc">${a.descricao}</div>

<div class="tag">${a.tipo.toUpperCase()}</div>

</div>

`;

grid.appendChild(card);

});

}

/* =========================
   EVENTOS
========================= */

search.addEventListener("input",render);

render();

</script>

</body>
</html>
