<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>CB SYSTEMS • Plataforma</title>

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== ROOT ===== */
:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;

--text:#f1f5f9;
--muted:#94a3b8;

--primary:#22c55e;
--danger:#ef4444;

--radius:18px;
}

/* ===== RESET ===== */
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Inter;
background:radial-gradient(circle at top,#020617,#020617 60%,#000);
color:var(--text);
overflow:hidden;
}

/* ===== CONTAINER ===== */
.container{
display:flex;
height:100vh;
}

/* ===== LEFT ===== */
.left{
flex:1;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* LOGO */
.logo{
font-size:38px;
font-weight:900;
letter-spacing:-1px;
}

/* DESC */
.desc{
margin-top:20px;
color:var(--muted);
max-width:420px;
line-height:1.6;
}

/* GRID APPS */
.apps{
margin-top:40px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

/* CARD */
.app{
background:linear-gradient(145deg,#0f172a,#020617);
border:1px solid var(--border);
padding:18px;
border-radius:14px;
transition:.25s;
cursor:pointer;
}

.app:hover{
transform:translateY(-6px);
border-color:var(--primary);
}

/* ===== RIGHT ===== */
.right{
width:420px;
border-left:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
padding:30px;
background:#020617;
}

/* BOX */
.box{
width:100%;
max-width:340px;
}

h2{
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:12px;
border:1px solid var(--border);
background:#020617;
color:#fff;
outline:none;
transition:.2s;
}

input:focus{
border-color:var(--primary);
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:#fff;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

/* LINKS */
.link{
margin-top:10px;
font-size:13px;
color:var(--muted);
cursor:pointer;
}

/* ERROR */
.error{
margin-top:10px;
color:var(--danger);
font-size:13px;
}

/* LOADING */
.loading{
opacity:.6;
pointer-events:none;
}

/* MOBILE */
@media(max-width:900px){
.container{
flex-direction:column;
}

.left{
display:none;
}

.right{
width:100%;
height:100vh;
}
}

</style>
</head>

<body>

<div class="container">

<!-- ===== APRESENTAÇÃO ===== -->
<div class="left">

<div class="logo">CB SYSTEMS</div>

<div class="desc">
Controle total da sua empresa em um único sistema inteligente.
Acesse todos os módulos com segurança e performance.
</div>

<div class="apps">
<div class="app">📊 Analytics</div>
<div class="app">🧾 CMV</div>
<div class="app">🛒 PDV</div>
<div class="app">📦 Estoque</div>
<div class="app">👥 RH</div>
<div class="app">📅 Agenda</div>
</div>

</div>

<!-- ===== LOGIN ===== -->
<div class="right">

<div class="box" id="box">

<h2>Entrar</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="link" onclick="recuperar()">Esqueci minha senha</div>

<div id="erro" class="error"></div>

</div>

</div>

</div>

<script>

/* ===== CONFIG MASTER ===== */
const supabase = supabase.createClient(
  "https://fcehmjmtxqmrjkuqlkay.supabase.co",
  "sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
);



  fcehmjmtxqmrjkuqlkay
/* ===== LOGIN ===== */
async function login(){

const box = document.getElementById('box');
box.classList.add('loading');

const email = document.getElementById('email').value;
const senha = document.getElementById('senha').value;
const erro = document.getElementById('erro');

erro.innerText = "";

try{

/* LOGIN AUTH */
const { data, error } = await supabase.auth.signInWithPassword({
email,
password: senha
});

if(error){
erro.innerText = "Email ou senha inválidos";
box.classList.remove('loading');
return;
}

/* BUSCAR EMPRESA */
const { data: empresa, error: erroEmpresa } = await supabase
.from('empresas')
.select('*')
.eq('email', email)
.single();

if(!empresa){
erro.innerText = "Empresa não encontrada";
box.classList.remove('loading');
return;
}

/* STATUS */
if(empresa.status !== 'ativo'){
erro.innerText = "Acesso bloqueado";
box.classList.remove('loading');
return;
}

/* SALVAR CONFIG CLIENTE */
localStorage.setItem("SUPABASE_URL", empresa.supabase_url);
localStorage.setItem("SUPABASE_KEY", empresa.supabase_anon_key);
localStorage.setItem("EMPRESA_NOME", empresa.nome);

/* REDIRECT */
window.location.href = "home.html";

}catch(e){
erro.innerText = "Erro de conexão";
box.classList.remove('loading');
}

}

/* ===== RECUPERAR SENHA ===== */
async function recuperar(){

const email = document.getElementById('email').value;

if(!email){
alert("Digite o email");
return;
}

await supabase.auth.resetPasswordForEmail(email,{
redirectTo: window.location.origin + "/reset.html"
});

alert("Email de recuperação enviado");

}

</script>

</body>
</html>
