<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<head>
<meta charset="UTF-8">
<title>Fichas Técnicas</title>

<link rel="icon" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --success:#16a34a;
  --danger:#dc2626;
  --warning:#f59e0b;

  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;

  --radius-lg:26px;
  --radius-md:14px;
  --radius-sm:8px;

  --shadow-xs:0 2px 6px rgba(0,0,0,.06);
  --shadow-sm:0 6px 16px rgba(0,0,0,.08);
  --shadow-md:0 18px 40px rgba(0,0,0,.12);
  --shadow-lg:0 40px 90px rgba(0,0,0,.35);
}


*{
  box-sizing:border-box;
  -webkit-font-smoothing:antialiased;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:
    radial-gradient(1200px 500px at 10% -10%, #eef2ff 0%, transparent 60%),
    radial-gradient(1200px 500px at 110% 10%, #ecfeff 0%, transparent 60%),
    var(--bg);
  color:var(--text);
}

body.modal-open{
  overflow:hidden;
  position:fixed;
  width:100%;
}


.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:22px;
  box-shadow:var(--shadow-md);
  overflow:hidden;
  cursor:pointer;
  transition:.18s ease;
  border:1px solid rgba(0,0,0,.03);
}

.card:hover{
  transform:translateY(-4px) scale(1.005);
  box-shadow:0 28px 70px rgba(0,0,0,.22);
}

.card img{
  width:100%;
  height:130px;  
  object-fit:cover;
  transition:.3s ease;
}

.card:hover img{
  transform:scale(1.04);
}

.card-body{
  padding:12px;  
}

.card-body h3{
  margin:0 0 6px;
  font-weight:900;
  font-size:16px;
  letter-spacing:-.01em;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;

  min-height:42px;  
}


.badges{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:6px;
}

.badges.primary{ margin-top:6px; }
.badges.secondary{ margin-top:10px; }

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:999px;
  background:#eef2ff;
  color:#3730a3;
  font-size:12px;
  font-weight:900;
  letter-spacing:.02em;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);
  backdrop-filter:blur(2px);
}

.modal{
  position:fixed;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(15,23,42,.65),
    rgba(15,23,42,.75)
  );
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modal-box{
  background:#fff;
  width:96vw;
  max-width:1440px;
  max-height:92vh;
  border-radius:26px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow-lg);
  animation:modalIn .2s ease;
  position:relative;
}

@keyframes modalIn{
  from{ opacity:0; transform:scale(.96) }
  to{ opacity:1; transform:scale(1) }
}

.modal-header{
  display:grid;
  grid-template-columns:34% 66%;
  gap:22px;
  padding:22px 26px;
  border-bottom:1px solid var(--border);
  background:
    radial-gradient(500px 200px at 10% -20%, #eef2ff 0%, transparent 60%),
    #fff;
}

.modal-left{
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  background:#000;

  display:flex;
  flex-direction:column;
}

.modal-img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#000;
  display:block;
}

/* =========================================================
   COLUNA DIREITA DO MODAL
========================================================= */
.modal-main{
  display:flex;
  flex-direction:column;
  gap:18px;
  padding:10px 6px 18px;
  overflow:hidden;
}

.modal-main h2{
  margin:0;
  font-size:34px;
  font-weight:900;
  letter-spacing:-.03em;
}

/* =========================================================
   CORPO DO MODAL
========================================================= */
.modal-body{
  padding:10px 4px 26px;
  overflow-y:auto;
  max-height:calc(92vh - 220px);
  scrollbar-gutter:stable;
}

.modal-body::-webkit-scrollbar{ width:8px }
.modal-body::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,#c7d2fe,#a5b4fc);
  border-radius:8px;
}

/* =========================================================
   TEXTOS DO MODAL
========================================================= */
.modal-body h3{
  margin:16px 0 8px;
  font-size:14px;
  font-weight:900;
  letter-spacing:.02em;
}

.modal-body p{
  margin:6px 0;
  font-size:14px;
  color:var(--muted);
}

.modal-body hr{
  border:none;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:14px 0;
}

/* =========================================================
   INGREDIENTES / IMPOSTOS
========================================================= */
.ing{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:14px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14px;
  align-items:center;
  margin-bottom:8px;
  background:#fff;
}

.ing b{ font-weight:800 }
.ing small{ color:var(--muted) }

/* =========================================================
   PRECIFICAÇÃO
========================================================= */
.precificacao{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin:16px 0;
  box-shadow:var(--shadow-xs);
}

/* =========================================================
   INPUTS / SELECTS
========================================================= */
input, select, textarea{
  height:38px;
  border-radius:10px;
  border:1px solid var(--border);
  padding:0 12px;
  font-size:13px;
  font-weight:700;
  width:100%;
  background:#fff;
}

textarea{
  height:auto;
  min-height:70px;
  padding:14px;
  resize:vertical;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.18);
}

input[readonly]{
  background:#e5e7eb;
}

/* =========================================================
   BOTÕES (PADRÃO ÚNICO)
========================================================= */
button{
  font-family:Inter,sans-serif;
  border:none;
  cursor:pointer;
}

.btn-add{
  height:38px;
  padding:0 14px;
  font-size:11px;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  box-shadow:0 6px 16px rgba(15,23,42,.25);
  transition:.15s ease;
}

.btn-add:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 26px rgba(15,23,42,.35);
}

.btn-icon{
  border-radius:8px;
  padding:6px 10px;
  font-size:13px;
  font-weight:800;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.btn-edit{
  background:#f1f5f9;
  color:#0f172a;
  border:1px solid var(--border);
}

.btn-delete{
  background:#fee2e2;
  color:#991b1b;
  border:1px solid #fecaca;
}

/* =========================================================
   FECHAR MODAL
========================================================= */
.close{
  position:absolute;
  top:14px;
  right:18px;
  font-size:26px;
  cursor:pointer;
  font-weight:900;
  color:#fff;
  z-index:10;
  text-shadow:0 4px 14px rgba(0,0,0,.7);
}

/* =========================================================
   RESPONSIVO
========================================================= */
@media(max-width:520px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:14px;
  }

  .card img{ height:110px }

  .modal{
    align-items:flex-end;
  }

  .modal-box{
    max-width:100%;
    height:92vh;
    border-radius:22px 22px 0 0;
  }

  .modal-header{
    grid-template-columns:1fr;
  }

  .modal-left{ height:180px }

  .modal-body{ padding:18px }

  .close{
    top:10px;
    right:14px;
    font-size:22px;
  }

  .ing{
    grid-template-columns:1fr auto;
    gap:8px;
  }

  .btn-add{ width:100% }
}
/* ====== SEÇÕES ORGANIZADAS ====== */
.secao{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin:14px 0;
  box-shadow:var(--shadow-xs);
}

.secao h3{
  margin:0 0 10px;
  font-size:14px;
  font-weight:900;
  letter-spacing:.02em;
}

/* ====== GRID COMPACTO ====== */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* ====== TABELA ESTILO PLANILHA ====== */
.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.table thead th{
  text-align:left;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  padding:6px 8px;
  border-bottom:1px solid var(--border);
}

.table tbody td{
  padding:4px 6px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  font-size:12px;
}

.table tbody tr:hover{
  background:#f8fafc;
}

.table .acoes{
  text-align:right;
  white-space:nowrap;
}

/* ====== RESUMO FINANCEIRO ====== */
.resumo{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.resumo .box{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 8px;
  font-size:11px;
}

.resumo .box b{
  display:block;
  font-size:13px;
  margin-top:2px;
}

/* ====== NUTRIÇÃO COMPACTA ====== */
.nutri-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.nutri-item{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  font-size:13px;
}
/* =========================
   TABLET (768px – 1100px)
========================= */
@media (min-width: 720px) and (max-width: 1100px){

  .grid{
    grid-template-columns:repeat(3, 1fr);
  }

  .modal-box{
    width:95vw;
    max-height:90vh;
  }

  .modal-header{
    grid-template-columns:40% 60%;
  }

  .modal-main h2{
    font-size:26px;
  }

  .resumo{
    grid-template-columns:repeat(2,1fr);
  }

  .card-stats{
    grid-template-columns:repeat(2,1fr);
  }

  .stat{
    font-size:11px;
  }

}

  .filters input{
    width:100%;
  }

  .filters select{
    width:100%;
  }

}


   
/* ====== RESPONSIVO ====== */
@media(max-width:720px){
  .resumo{ grid-template-columns:1fr 1fr; }
  .nutri-grid{ grid-template-columns:1fr 1fr; }
}   




/* versão compacta do card de precificação */
.precificacao.compact{
  padding:12px;
  margin:0;
}

.precificacao.compact label{
  font-weight:900;
  font-size:12px;
  display:block;
  margin-bottom:6px;
}

.precificacao.compact input{
  height:40px;
  font-size:13px;
  border-radius:10px;
}

.precificacao.compact small{
  display:block;
  margin-top:4px;
  font-size:11px;
  color:var(--muted);
}

/* no mobile, volta pra 1 coluna */
@media(max-width:720px){
  .grid-2{
    grid-template-columns:1fr;
  }
}




/* linha compacta para adicionar ingrediente */
.precificacao.compact-line{
  padding:12px;
}

.line-add{
  display:grid;
  grid-template-columns: 2fr .7fr .7fr 180px;
  gap:10px;
  align-items:center;
}


  
.line-select{
  height:40px;
  border-radius:12px;
  font-size:13px;
}

.line-qtd{
  height:40px;
  font-size:13px;
  text-align:center;
}

.line-unidade{
  height:40px;
  font-size:12px;
  text-align:center;
  background:#f1f5f9 !important;
}

.btn-line{
  height:40px;
  width:44px;
  padding:0;
  border-radius:12px;
  font-size:18px;
  font-weight:900;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* mobile: quebra em 2 linhas */
@media(max-width:720px){
  .line-add{
    grid-template-columns:1fr 1fr;
  }

.btn-line{
  height:40px;
  min-width:44px;
  padding:0 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}
}
/* ===== CARDS FINANCEIROS COMPACTOS ===== */
.card-stats{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
  margin-top:10px;
}

.stat{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 8px;     /* 👈 menos padding */
  font-size:10px;     /* 👈 fonte menor */
  line-height:1.1;
  box-shadow:var(--shadow-xs);
}

.stat b{
  display:block;
  margin-top:4px;
  font-size:13px;
  font-weight:900;
}

.stat.green{
  background:#ecfdf5;
  border-color:#a7f3d0;
  color:#065f46;
}

.stat.red{
  background:#fef2f2;
  border-color:#fecaca;
  color:#991b1b;
}

.stat.blue{
  background:#eef2ff;
  border-color:#c7d2fe;
  color:#3730a3;
}

.stat.orange{
  background:#fff7ed;
  border-color:#fed7aa;
  color:#9a3412;
}

/* mobile: 2 colunas */
@media(max-width:520px){
  .card-stats{
    grid-template-columns: repeat(2, 1fr);
  }
}

.card-stats{
  min-height:76px;  /* 🔥 cabe melhor no 100% */
}
.stat b{
  min-height:14px;
  display:block;
}

.desc-card{
  font-size:12px;          /* 🔥 fonte menor */
  color:#64748b;
  line-height:1.25;
  margin:2px 0 6px;       /* 🔥 menos margem */

  display:-webkit-box;
  -webkit-line-clamp:1;   /* 🔥 só 1 linha no card */
  -webkit-box-orient:vertical;
  overflow:hidden;

  min-height:18px;        /* 🔥 menos altura fixa */
}

/* =========================
   BOTÃO VOLTAR AO TOPO
========================= */
#btnTop{
  position:fixed;
  bottom:30px;
  right:30px;

  width:52px;
  height:52px;

  border-radius:50%;
  border:none;

background:#0f172a;
  color:#fff;
  font-size:20px;
  font-weight:900;

  box-shadow:0 12px 30px rgba(37,99,235,.4);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:60;
}

#btnTop.show{
  opacity:1;
  pointer-events:auto;
}
/* =========================================
   OVERLAY RESTAURANTE ORIGINAL
========================================= */

.overlay-loading{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  overflow:hidden;
}

.overlay-loading.hidden{
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease;
}

/* Fundo ambiente animado */
.overlay-ambient{
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,120,0,.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,.15), transparent 40%);
  animation:ambientMove 8s linear infinite;
}

@keyframes ambientMove{
  0%{ transform:translate(0,0); }
  50%{ transform:translate(-5%, -5%); }
  100%{ transform:translate(0,0); }
}

/* Centro */
.overlay-center{
  position:relative;
  text-align:center;
  color:#fff;
  z-index:2;
}

.overlay-center h2{
  margin-top:24px;
  font-size:28px;
  font-weight:900;
  letter-spacing:-.02em;
}

.overlay-center p{
  margin-top:10px;
  font-size:14px;
  opacity:.7;
}


/* Talheres + prato decorativos */
.cutlery{
  position:absolute;
  width:300px;
  height:300px;
  animation:rotateSlow 12s linear infinite;
}

@keyframes rotateSlow{
  to{ transform:rotate(360deg); }
}

/* Garfo */
.fork{
  position:absolute;
  left:0;
  top:50%;
  width:8px;
  height:120px;
  background:#ffffff15;
  border-radius:4px;
  transform:translateY(-50%);
}

/* Faca */
.knife{
  position:absolute;
  right:0;
  top:50%;
  width:8px;
  height:120px;
  background:#ffffff15;
  border-radius:4px;
  transform:translateY(-50%);
}

/* Prato */
.plate{
  position:absolute;
  top:50%;
  left:50%;
  width:160px;
  height:160px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.08);
  transform:translate(-50%,-50%);
}






/* =========================================
   FILTROS — MENU ESCURO PREMIUM
========================================= */

.filters{
  background:#0f172a;
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:8px;
  border-bottom:1px solid #1e293b;
  position:sticky;
  top:0;
  z-index:50;
  flex-wrap:wrap;
}

/* INPUT BUSCA */
.filters input{
  flex:1;
  min-width:240px;
  height:34px;

  border-radius:8px;
  border:1px solid #334155;

  padding:0 10px;

  font-size:12px;
  font-weight:600;

  background:#1e293b;
  color:#fff;

  outline:none;
}

.filters input::placeholder{
  color:#94a3b8;
}

/* SELECTS */
.filters select{
  width:150px;
  height:34px;

  border-radius:8px;
  border:1px solid #334155;

  padding:0 8px;

  font-size:12px;
  font-weight:600;

  background:#1e293b;
  color:#fff;

  outline:none;
}

/* HOVER */
.filters select:hover,
.filters input:hover{
  border-color:#475569;
}

/* FOCO */
.filters input:focus,
.filters select:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,.2);
}

/* MOBILE */
@media (max-width:600px){

  .filters input{
    flex:1 1 100%;
    min-width:0;
  }

  .filters select{
    width:48%;
  }

}

.btn-cadastrar{

height:34px;
padding:0 16px;

border-radius:8px;

background:#16a34a;
color:white;

font-size:12px;
font-weight:800;
letter-spacing:.04em;

border:none;

cursor:pointer;

box-shadow:0 8px 18px rgba(22,163,74,.35);

transition:.15s ease;

}

.btn-cadastrar:hover{

transform:translateY(-1px);

box-shadow:0 12px 26px rgba(22,163,74,.45);

}.popupCadastro{

position:fixed;
inset:0;

background:rgba(15,23,42,.75);
backdrop-filter:blur(6px);

display:none;
align-items:center;
justify-content:center;

z-index:200;

}

.popupCadastroBox{

width:95vw;
max-width:1400px;
height:92vh;

background:#fff;

border-radius:24px;

box-shadow:0 40px 100px rgba(0,0,0,.45);

overflow:hidden;

display:flex;
flex-direction:column;

animation:popupIn .18s ease;

}

@keyframes popupIn{
from{transform:scale(.96);opacity:0}
to{transform:scale(1);opacity:1}
}

.popupCadastroHeader{

height:60px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 20px;

font-weight:800;
font-size:14px;

border-bottom:1px solid #e5e7eb;

background:#f8fafc;

}

.popupCadastroHeader button{

border:none;
background:#ef4444;

color:white;

width:34px;
height:34px;

border-radius:8px;

font-size:16px;
font-weight:900;

cursor:pointer;

}

.popupCadastro iframe{

flex:1;
border:none;

}


.foto-upload{
  background:#f8fafc;
  border-top:1px solid var(--border);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.foto-upload input{
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px;
}


  

.foto-upload label{
  font-weight:800;
  font-size:12px;
  display:block;
  margin-bottom:6px;
}

.foto-upload input{
  width:100%;
  font-size:12px;
}



#historicoBox{
background:#000;
color:#fff;

async function fetchAll(table, select) {
  const pageSize = 1000;
  let from = 0;
  let to = pageSize - 1;
  let all = [];

  while (true) {
    const { data, error } = await sb
      .from(table)
      .select(select)
      .range(from, to);

    if (error) {
      console.error("Erro ao buscar", table, error);
      break;
    }

    if (!data || data.length === 0) break;

    all = all.concat(data);

    if (data.length < pageSize) break;

    from += pageSize;
    to += pageSize;
  }

  return all;
}

async function calcularCMVPercentual(prato){
  if(!prato.preco_venda || prato.preco_venda <= 0) return null;

  const { data: itens } = await sb
    .from("buffet_itens")
    .select("custo_calculado")
    .eq("buffet_id", prato.id);

  const cmvBase = (itens || []).reduce(
    (s,i)=> s + Number(i.custo_calculado || 0), 0
  );

  const { data: impostos } = await sb
    .from("impostos")
    .select("modalidade, valor")
    .eq("buffet_id", prato.id);

  let totalImpostos = 0;

  (impostos || []).forEach(i=>{
    if(i.modalidade === "FIXO")
      totalImpostos += Number(i.valor);

    if(i.modalidade === "PERCENTUAL")
      totalImpostos += (cmvBase * Number(i.valor)) / 100;
  });

  const cmvFinal = cmvBase + totalImpostos;

  return (cmvFinal / prato.preco_venda) * 100;
}

let cacheCMV = {};

async function carregarCMVCache(){
  cacheCMV = {};

  const itens = await fetchAll("buffet_itens", "buffet_id, custo_calculado");

function calcMetricsForList(p){
  const dados = cacheCMV[p.id] || { cmvBase:0, impostos:[] };

  let totalImpostos = 0;
  (dados.impostos || []).forEach(i=>{
    if(i.modalidade === "FIXO") totalImpostos += Number(i.valor);
    if(i.modalidade === "PERCENTUAL")
      totalImpostos += (Number(dados.cmvBase||0) * Number(i.valor||0)) / 100;
  });

  const custoBase = dados.cmvBase > 0
    ? dados.cmvBase
    : Number(p.custo_total || p.custo_unitario || 0);

  const custoFinal = dados.cmvBase > 0
    ? (dados.cmvBase + totalImpostos)
    : Number(p.custo_total || p.custo_unitario || 0);

  const pv = Number(p.preco_venda || 0);

  const cmvPerc = pv > 0 ? (custoBase / pv) * 100 : null;
  const lucro = pv > 0 ? (pv - custoFinal) : null;
  const margem = pv > 0 ? (lucro / pv) * 100 : null;

  return { custoBase, custoFinal, cmvPerc, lucro, margem };
}

function inRangeCMV(cmv, faixa){
  if(!faixa) return true;
  if(cmv == null || isNaN(cmv)) return false;

  if(faixa === "lt30") return cmv < 30;
  if(faixa === "30_35") return cmv >= 30 && cmv < 35;
  if(faixa === "35_40") return cmv >= 35 && cmv < 40;
  if(faixa === "gt40") return cmv >= 40;
  return true;
}

function inRangeMargem(margem, faixa){
  if(!faixa) return true;
  if(margem == null || isNaN(margem)) return false;

  if(faixa === "lt25") return margem < 25;
  if(faixa === "25_30") return margem >= 25 && margem < 30;
  if(faixa === "30_40") return margem >= 30 && margem < 40;
  if(faixa === "gt40") return margem >= 40;
  return true;
}

        custo_calculado: custoUnit * quantidade
      })
      .eq("id", itemId);

    await carregarCMVCache();
    await carregarPratos();
    aplicarFiltros();

    const { data: pratoNovo } = await sb
      .from("buffet")
      .select("*")
      .eq("id", pratoAtual.id)
      .single();

    btn.innerText = "＋";
    btn.classList.remove("btn-edit");
    btn.classList.add("btn-add");
    btn.onclick = salvarIngrediente;

    busca.value = "";
    qtd.value = "";
    unidade.value = "";

    abrirModal(pratoNovo);

  }catch(err){

    console.error(err);
    alert("Erro ao atualizar ingrediente");
  }finally{

    btn.classList.remove("btn-loading");

  }

};   // fecha btn.onclick
}    // fecha editarIngrediente

async function carregarTipos(){
  const { data, error } = await sb
    .from("buffet")
    .select("tipo");

  if(error){
    console.error("Erro ao buscar tipos:", error);
    return;
  }

  const tiposUnicos = [...new Set(
    (data || [])
      .map(i => (i.tipo || "").trim())
      .filter(Boolean)
  )].sort();

  // filtro principal
  if (window.filtroTipo) {
    filtroTipo.innerHTML = `<option value="">Todos os tipos</option>` +
      tiposUnicos.map(t => `<option value="${t}">${t}</option>`).join("");

    // 🔁 mantém o filtro selecionado visualmente
    if (filtroTipoSelecionado) {
      filtroTipo.value = filtroTipoSelecionado;
    }
  }

  // select do modal
  const selectModal = document.getElementById("tipoPrato");
  if (selectModal) {
    selectModal.innerHTML = `
      <option value="">SELECIONE</option>
      ${tiposUnicos.map(t => `<option value="${t}">${t}</option>`).join("")}
    `;
  }
}

async function editarNomePrato(){
  const h2 = document.getElementById("tituloPrato");
  if (!h2 || !pratoAtual?.id) return;

  const nomeAtual = h2.innerText.trim();

  const novoNome = prompt("Novo nome do prato:", nomeAtual);
  if (!novoNome || novoNome.trim() === nomeAtual) return;

  const nomeFinal = novoNome.trim().toUpperCase();

  const { error } = await sb
    .from("buffet")
    .update({ nome: nomeFinal })
    .eq("id", pratoAtual.id);

  if (error) {
    alert("Erro ao salvar o nome");
    return;
  }

  // 🔄 atualiza estado local
  pratoAtual.nome = nomeFinal;

  // atualiza o header do modal
  h2.innerText = nomeFinal;
await carregarCMVCache();  // 🔁 atualiza cache
await carregarPratos();    // 🔁 atualiza lista
aplicarFiltros();}

window.addEventListener("scroll", () => {
  const scrollTop =
    window.pageYOffset || document.documentElement.scrollTop;

  const windowHeight =
    window.innerHeight || document.documentElement.clientHeight;

  const fullHeight =
    document.documentElement.scrollHeight || document.body.scrollHeight;

  if (scrollTop + windowHeight >= fullHeight - 200) {
    renderProximaPagina();
  }
});

return
}

}function renderHistorico(lista){

const box = document.getElementById("historicoBox")

if(!lista || lista.length===0){
box.innerHTML="<p style='opacity:.5'>Sem histórico</p>"
return
}

box.innerHTML = lista.map(r=>{

const data = new Date(r.alterado_em).toLocaleString()

return `
<div class="h-item">

<div>

<strong>${data}</strong><br>

${Object.keys(r.dados_depois||{})
.map(k=>{

const antes = r.dados_antes?.[k]
const depois = r.dados_depois?.[k]

if(antes===depois) return ""

return `
<div class="h-field">
${k}: ${antes} → ${depois}
</div>
`

}).join("")}

</div>

<div>

<button class="h-restore"
onclick="restaurar('${r.id}')">
Restaurar
</button>

</div>

</div>
`

}).join("")

}

document.addEventListener("input", e => {

  if(e.target.id !== "ingBusca") return;

  const termo = e.target.value.toLowerCase().trim();
  const box = document.getElementById("resultadoIngredientes");

  if(!termo){
    box.style.display="none";
    return;
  }

  const resultados = ingredientesBase.filter(i =>
    i.nome.toLowerCase().includes(termo)
  );

  if(resultados.length === 0){
    box.innerHTML = `<div style="padding:10px;font-size:12px">Nenhum ingrediente</div>`;
    box.style.display="block";
    return;
  }

  box.innerHTML = resultados.map(i=>`

    <div
      class="itemIngrediente"
      data-id="${i.id}"
      style="
        padding:10px;
        cursor:pointer;
        border-bottom:1px solid #f1f5f9;
        font-size:13px;
      "
    >
      ${i.nome}
    </div>

  `).join("");

  box.style.display="block";

});

document.addEventListener("click", e => {

  const item = e.target.closest(".itemIngrediente");
  if(!item) return;

  e.stopPropagation();

  const id = item.dataset.id;

  const prod = ingredientesBase.find(p => p.id == id);

  if(!prod){
    console.warn("Ingrediente não encontrado:", id);
    return;
  }

  ingredienteSelecionado = prod;

  document.getElementById("ingBusca").value = prod.nome;
  document.getElementById("ingUnidade").value = prod.unidade_medida || "";

  document.getElementById("resultadoIngredientes").style.display = "none";

});
