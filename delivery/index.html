<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Mercatto Delícia • Dashboard</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  
<style>

:root{

--bg:#0b0b0b;
--panel:#121212;
--wood:#3b2a1c;
--gold:#d4af37;
--line:#1f1f1f;

--text:#ffffff;
--muted:#9ca3af;

--radius:14px;

}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{

background:
linear-gradient(180deg,#0b0b0b,#151515);

color:var(--text);

height:100vh;

display:flex;

}

/* SIDEBAR */

.sidebar{

width:260px;

background:

linear-gradient(180deg,#1a120a,#0b0b0b);

border-right:1px solid #2b2b2b;

display:flex;

flex-direction:column;

padding:22px;

}

.logo{

font-size:22px;
font-weight:800;

color:var(--gold);

margin-bottom:30px;

letter-spacing:1px;

}

.menu{

display:flex;
flex-direction:column;
gap:10px;

}

.menu button{

background:none;
border:none;

text-align:left;

color:#ddd;

padding:12px;

border-radius:10px;

font-size:14px;

cursor:pointer;

transition:.2s;

}

.menu button:hover{

background:#1c1c1c;
color:#fff;

}

.menu button.active{

background:linear-gradient(90deg,#3b2a1c,#000);
border-left:3px solid var(--gold);

}

/* CONTENT */

.main{

flex:1;

display:flex;

flex-direction:column;

}

/* TOPBAR */

.topbar{

height:70px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 24px;

border-bottom:1px solid var(--line);

background:#111;

}

.clock{

font-weight:700;
color:var(--gold);

}

/* IFRAME AREA */

.content{

flex:1;

padding:10px;

}

iframe{

width:100%;
height:100%;

border:none;

border-radius:10px;

background:white;

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
MERCATTO
</div>

<div class="menu">

<button onclick="abrir('delivery/home.html')" class="active">
🏠 Dashboard
</button>

<button onclick="abrir('pedidos.html')">
🍔 Pedidos
</button>

<button onclick="abrir('cozinha.html')">
👨‍🍳 Cozinha
</button>

<button onclick="abrir('cardapio.html')">
📋 Cardápio
</button>

<button onclick="abrir('clientes.html')">
👤 Clientes
</button>

<button onclick="abrir('relatorios.html')">
📊 Relatórios
</button>

<button onclick="abrir('config.html')">
⚙ Configurações
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<div>
Painel Operacional
</div>

<div class="clock" id="hora"></div>

</div>

<div class="content">

<iframe id="frame" src="home.html"></iframe>

</div>

</div>

<script>

function abrir(pagina){

document.getElementById("frame").src=pagina

document.querySelectorAll(".menu button")
.forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

}

function atualizarHora(){

const agora=new Date()

document.getElementById("hora").innerText=
agora.toLocaleTimeString()

}

setInterval(atualizarHora,1000)

atualizarHora()

</script>

</body>
</html>
