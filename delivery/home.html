<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel de Pedidos</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{

--bg:#0b0b0b;
--card:#1b1b1b;

--red:#ef4444;
--yellow:#f59e0b;
--green:#22c55e;
--blue:#3b82f6;

--border:#2a2a2a;

}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{

background:var(--bg);
color:white;

padding:20px;

}

/* BOARD */

.board{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:16px;

height:90vh;

}

/* COLUNA */

.col{

background:#121212;

border-radius:14px;

padding:10px;

overflow:auto;

}

.col h2{

font-size:18px;

margin-bottom:10px;

display:flex;
justify-content:space-between;

}

/* CARD */

.card{

background:var(--card);

border-radius:12px;

padding:14px;

margin-bottom:12px;

border:1px solid var(--border);

cursor:pointer;

transition:.15s;

}

.card:hover{

transform:scale(1.02);

}

/* CLIENTE */

.nome{

font-size:18px;
font-weight:800;

}

/* TEMPO */

.timer{

font-size:24px;

font-weight:800;

margin-top:6px;

}

.red{color:var(--red)}
.yellow{color:var(--yellow)}
.green{color:var(--green)}

/* ITENS */

.itens{

margin-top:10px;

font-size:14px;

line-height:1.4;

}

/* TOTAL */

.total{

margin-top:10px;

font-weight:800;

font-size:16px;

}

/* ACTIONS */

.actions{

margin-top:10px;

display:flex;

gap:6px;

flex-wrap:wrap;

}

button{

border:none;

padding:6px 10px;

border-radius:8px;

font-weight:700;

cursor:pointer;

}

.aprovar{background:var(--blue);color:white}
.preparo{background:var(--yellow)}
.pronto{background:var(--green);color:white}
.entregue{background:#555;color:white}

/* MODAL */

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.7);

display:none;

align-items:center;
justify-content:center;

}

.modalBox{

background:#111;

width:520px;

padding:20px;

border-radius:14px;

max-height:80vh;

overflow:auto;

}

.close{

float:right;

cursor:pointer;

color:red;

font-weight:800;

}

.item{

display:flex;

gap:10px;

border:1px solid #333;

padding:10px;

border-radius:10px;

margin-top:10px;

}

.item img{

width:70px;
height:70px;

object-fit:cover;

border-radius:8px;

}

</style>

</head>

<body>

<div class="board">

<div class="col" data-status="novo">
<h2>🟥 Pendentes</h2>
</div>

<div class="col" data-status="aprovado">
<h2>🟨 Preparo</h2>
</div>

<div class="col" data-status="pronto">
<h2>🟩 Prontos</h2>
</div>

<div class="col" data-status="entregue">
<h2>⬛ Entregues</h2>
</div>

</div>

<div id="modal" class="modal">

<div class="modalBox">

<span class="close" onclick="fechar()">X</span>

<h2 id="titulo"></h2>

<div id="detalhes"></div>

<button onclick="imprimir()" style="margin-top:10px">🖨 Imprimir</button>

</div>

</div>

<script>

const db=supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let pedidos=[]
let atual=null

async function carregar(){

const {data}=await db
.from("pedidos")
.select("*")
.order("created_at",{ascending:true})

pedidos=data||[]

render()

}

function render(){

document.querySelectorAll(".col").forEach(c=>{

const titulo=c.querySelector("h2").outerHTML
c.innerHTML=titulo

})

pedidos.forEach(p=>{

const col=document.querySelector(`[data-status="${p.status}"]`)
if(!col)return

let total=0
let itens=""

p.itens.forEach(i=>{
total+=i.preco*i.quantidade
itens+=`${i.quantidade}x ${i.nome}<br>`
})

const created=new Date(p.created_at)

const minutos=Math.floor((Date.now()-created)/60000)

let cor="green"

if(minutos>15) cor="red"
else if(minutos>8) cor="yellow"

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="nome">${p.cliente_nome}</div>

<div class="timer ${cor}">
${minutos} min
</div>

<div class="itens">
${itens}
</div>

<div class="total">
R$ ${total}
</div>

<div class="actions">

${p.status==="novo"?`<button class="aprovar" onclick="status('${p.id}','aprovado')">Aceitar</button>`:''}

${p.status==="aprovado"?`<button class="preparo" onclick="status('${p.id}','preparo')">Preparando</button>`:''}

${p.status==="preparo"?`<button class="pronto" onclick="status('${p.id}','pronto')">Pronto</button>`:''}

${p.status==="pronto"?`<button class="entregue" onclick="status('${p.id}','entregue')">Entregue</button>`:''}

</div>

`

card.onclick=()=>abrir(p)

col.appendChild(card)

})

}

async function status(id,s){

await db
.from("pedidos")
.update({status:s})
.eq("id",id)

carregar()

}

async function abrir(p){

atual=p

document.getElementById("titulo").innerText=p.cliente_nome

const area=document.getElementById("detalhes")

area.innerHTML=""

for(const it of p.itens){

let foto=""

const {data}=await db
.from("buffet")
.select("foto_url")
.ilike("nome",it.nome)
.limit(1)

if(data.length) foto=data[0].foto_url

area.innerHTML+=`

<div class="item">

${foto?`<img src="${foto}">`:''}

<div>

<b>${it.nome}</b><br>

${it.quantidade}x R$ ${it.preco}

</div>

</div>

`

}

document.getElementById("modal").style.display="flex"

}

function fechar(){

document.getElementById("modal").style.display="none"

}

function imprimir(){

let texto="PEDIDO MERCATTO\n\n"

texto+="Cliente: "+atual.cliente_nome+"\n"

let total=0

atual.itens.forEach(i=>{

texto+=`${i.quantidade}x ${i.nome}\n`

total+=i.preco*i.quantidade

})

texto+="\nTOTAL: "+total

const w=window.open("","","width=300,height=600")

w.document.write("<pre>"+texto+"</pre>")

w.print()

}

setInterval(carregar,5000)

carregar()

</script>

</body>
</html>
