<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Mercatto Delícia • Painel Delivery</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{

--madeira:#5c3a21;
--vermelho:#c1121f;
--branco:#ffffff;
--preto:#0b0b0b;

--bg:#111;
--card:#1a1a1a;
--line:#2b2b2b;

--radius:14px;

}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:linear-gradient(180deg,#0b0b0b,#151515);
color:white;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:24px;
font-weight:800;
color:#fff;
}

.board{

display:grid;
grid-template-columns:1.2fr 1fr 1fr;
gap:16px;

}

.col{

border-radius:16px;
padding:12px;
min-height:70vh;

}

.col h2{

font-size:16px;
font-weight:800;
margin-bottom:12px;

display:flex;
justify-content:space-between;

}

.pendentes{
background:linear-gradient(180deg,#3d0006,#1a0003);
border:1px solid #7f000f;
}

.aprovados{
background:linear-gradient(180deg,#4a3a00,#1a1400);
border:1px solid #c7a600;
}

.prontos{
background:linear-gradient(180deg,#003312,#001a08);
border:1px solid #0fa958;
}

.card{

background:#0f0f0f;
border:1px solid #2a2a2a;
border-radius:14px;
padding:14px;
margin-bottom:12px;
cursor:pointer;

transition:.2s;

}

.card:hover{
transform:scale(1.02);
border-color:#c1121f;
}

.nome{
font-size:16px;
font-weight:800;
}

.telefone{
font-size:13px;
color:#aaa;
margin-top:2px;
}

.tipo{

font-size:11px;
background:#222;
display:inline-block;
padding:3px 6px;
border-radius:6px;
margin-top:6px;

}

.endereco{

font-size:12px;
color:#ccc;
margin-top:4px;

}

.itens{

font-size:12px;
margin-top:8px;
line-height:1.4;

}

.total{

font-weight:800;
margin-top:8px;
color:#fff;

}

.timer{

font-size:12px;
color:#ffcc00;
font-weight:700;

}

.actions{

margin-top:10px;
display:flex;
gap:6px;
flex-wrap:wrap;

}

button{

border:none;
border-radius:8px;
padding:6px 10px;
font-weight:700;
cursor:pointer;

}

.aprovar{
background:#0fa958;
color:white;
}

.preparo{
background:#c7a600;
color:black;
}

.pronto{
background:#0fa958;
color:white;
}

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;

}

.modalBox{

width:520px;
max-height:80vh;
overflow:auto;

background:#111;
border-radius:14px;
padding:20px;

}

.item{

display:flex;
gap:10px;
border:1px solid #333;
border-radius:10px;
padding:10px;
margin-top:10px;

}

.item img{

width:70px;
height:70px;
object-fit:cover;
border-radius:8px;

}

.close{
float:right;
cursor:pointer;
color:red;
font-weight:800;
}

@media print{

body{
width:80mm;
font-size:12px;
}

.noPrint{
display:none;
}

}

</style>

</head>

<body>

<header>

<h1>🔥 Painel Delivery Mercatto</h1>

<div id="hora"></div>

</header>

<div class="board">

<div class="col pendentes" data-status="novo">

<h2>🔴 Pendentes</h2>

</div>

<div class="col aprovados" data-status="aprovado">

<h2>🟡 Em preparo</h2>

</div>

<div class="col prontos" data-status="pronto">

<h2>🟢 Prontos</h2>

</div>

</div>

<div id="modal" class="modal">

<div class="modalBox">

<span class="close" onclick="fechar()">X</span>

<h2 id="titulo"></h2>

<div id="detalhes"></div>

<button onclick="imprimir()" class="noPrint" style="margin-top:10px">🖨 Imprimir</button>

</div>

</div>

<script>

const db=supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let pedidos=[]
let atual=null

async function carregar(){

const {data}=await db
.from("pedidos")
.select("*")
.order("created_at",{ascending:false})

pedidos=data||[]

render()

}

function render(){

document.querySelectorAll(".col").forEach(c=>{

const titulo=c.querySelector("h2").outerHTML
c.innerHTML=titulo

})

pedidos.forEach(p=>{

const col=document.querySelector(`[data-status="${p.status}"]`)
if(!col)return

const card=document.createElement("div")
card.className="card"

const created=new Date(p.created_at)

const minutos=Math.floor((Date.now()-created)/60000)

let total=0

let itensResumo=""

p.itens.forEach(i=>{
total+=i.preco*i.quantidade
itensResumo+=`${i.quantidade}x ${i.nome}<br>`
})

card.innerHTML=`

<div class="nome">${p.cliente_nome}</div>

<div class="telefone">${p.cliente_telefone}</div>

<div class="tipo">${p.tipo}</div>

<div class="endereco">${p.cliente_endereco||""}</div>

<div class="itens">${itensResumo}</div>

<div class="total">R$ ${total}</div>

<div class="timer">${minutos} min</div>

<div class="actions">

${p.status==="novo"?`<button class="aprovar" onclick="aprovar('${p.id}')">Aprovar</button>`:''}

${p.status==="aprovado"?`<button class="preparo" onclick="preparo('${p.id}')">Preparo</button>`:''}

${p.status==="preparo"?`<button class="pronto" onclick="pronto('${p.id}')">Pronto</button>`:''}

</div>

`

card.onclick=()=>abrir(p)

col.appendChild(card)

})

}

async function aprovar(id){

await db
.from("pedidos")
.update({status:"aprovado"})
.eq("id",id)

carregar()

}

async function preparo(id){

await db
.from("pedidos")
.update({status:"preparo"})
.eq("id",id)

carregar()

}

async function pronto(id){

await db
.from("pedidos")
.update({status:"pronto"})
.eq("id",id)

carregar()

}

async function abrir(p){

atual=p

document.getElementById("titulo").innerText=p.cliente_nome

const area=document.getElementById("detalhes")

area.innerHTML=""

for(const it of p.itens){

let foto=""

const {data}=await db
.from("buffet")
.select("foto_url")
.ilike("nome",it.nome)
.limit(1)

if(data.length) foto=data[0].foto_url

area.innerHTML+=`

<div class="item">

${foto?`<img src="${foto}">`:''}

<div>

<b>${it.nome}</b><br>

${it.quantidade}x R$ ${it.preco}

</div>

</div>

`

}

document.getElementById("modal").style.display="flex"

}

function fechar(){
document.getElementById("modal").style.display="none"
}

function imprimir(){

let texto="MERCATTO DELICIA\n\n"

texto+="Cliente: "+atual.cliente_nome+"\n"
texto+="Telefone: "+atual.cliente_telefone+"\n"
texto+="Tipo: "+atual.tipo+"\n\n"

texto+="ITENS\n"

let total=0

atual.itens.forEach(i=>{
texto+=`${i.quantidade}x ${i.nome}\n`
total+=i.preco*i.quantidade
})

texto+="\nTOTAL: R$ "+total

const w=window.open("","","width=300,height=600")

w.document.write("<pre>"+texto+"\n\n\n\n</pre>")

w.print()

}

function atualizarHora(){
document.getElementById("hora").innerText=new Date().toLocaleTimeString()
}

setInterval(atualizarHora,1000)

setInterval(carregar,5000)

carregar()

</script>

</body>
</html>
